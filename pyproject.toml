[project]
name = "engineering-studio-ai"
version = "0.1.0"
description = "Multi-agent Engineering Studio AI demo for the AMD LabLabAI Hackathon (Act II)"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
dependencies = [
    "requests>=2.31",
    "python-dotenv>=1.0",
    "pydantic>=2.6",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-cov>=5.0",
    "ruff>=0.5",
    "mypy>=1.10",
    "httpx>=0.27",
]
api = [
    "fastapi>=0.111",
    "uvicorn>=0.30",
]
webapp = [
    "fastapi>=0.111",
    "uvicorn>=0.30",
    "jinja2>=3.1",
    "python-multipart>=0.0.9",
]
gui = [
    "textual>=0.58",
]

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
"engineering_studio.webapp" = ["templates/*.html"]

[tool.ruff]
line-length = 100

[tool.mypy]
python_version = "3.11"
strict = true

[tool.pytest.ini_options]
addopts = "--cov=engineering_studio --cov-report=term-missing --cov-fail-under=100"

[tool.coverage.run]
source = ["engineering_studio"]
omit = ["*/__main__.py"]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "if __name__ == .__main__.:",
]
