<!--
WHAT: Base Jinja2 layout shared by every webapp page.
WHY: Single place to apply the mandated Variant B interface-surface
palette (utils.palette.PALETTE_B) so no page template hard-codes a hex
color literal, per aesthetic_standards.txt section 1.2.4 (no A/B mixing on
one surface layer) and the 2026-07-07 explicit color override recorded
in utils/palette.py.
HOW: Jinja2 block-based inheritance; palette values are passed in from
the route handler via the template context (palette), never imported
into the template itself, keeping the template a pure render target.
-->
<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>{% block title %}Engineering Studio AI{% endblock %}</title>
		<style>
			body {
			    background-color: {{ palette.background }};
			    color: {{ palette.foreground_primary }};
			    font-family: "Segoe UI", system-ui, sans-serif;
			    max-width: 48rem;
			    margin: 2rem auto;
			    padding: 0 1rem;
			    line-height: 1.5;
			}
			a { color: {{ palette.accent }}; }
			h1, h2 { color: {{ palette.accent }}; }
			.accent-border {
			    border: 1px solid {{ palette.accent }};
			    border-radius: 6px;
			    padding: 1rem;
			}
			button {
			    background-color: {{ palette.accent }};
			    color: {{ palette.background }};
			    border: none;
			    border-radius: 4px;
			    padding: 0.5rem 1rem;
			    font-weight: 600;
			    cursor: pointer;
			}
			textarea, input[type="text"] {
			    width: 100%;
			    background-color: {{ palette.background }};
			    color: {{ palette.foreground_primary }};
			    border: 1px solid {{ palette.accent }};
			    border-radius: 4px;
			    padding: 0.5rem;
			}
			.muted { color: {{ palette.muted or palette.accent }}; font-size: 0.9rem; }
			.error { color: #C4453D; font-weight: 600; }
		</style>
	</head>
	<body>
		<h1>Engineering Studio AI</h1>
		{% block content %}{% endblock %}
		<p class="muted">
			Rendered by <code>engineering_studio.webapp</code>, W6a.
		</p>
	</body>
</html>
